# Bind to usb0 only
interface=usb0
bind-interfaces

# DHCP range and lease time
dhcp-range=192.168.7.50,192.168.7.150,12h

# Gateway (this Pi)
dhcp-option=3,192.168.7.1

# DNS servers (will route through VPN when active)
dhcp-option=6,1.1.1.1,1.0.0.1

# Domain
domain=gateway.local

# Security settings
domain-needed
bogus-priv
no-resolv

# Upstream DNS servers
server=1.1.1.1
server=1.0.0.1

# Logging
log-dhcp

# DHCP authoritative mode
dhcp-authoritative
